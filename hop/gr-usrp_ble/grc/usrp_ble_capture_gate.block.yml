id: usrp_ble_capture_gate
label: capture_gate
category: '[usrp_ble]'

templates:
  imports: from gnuradio import usrp_ble
  make: usrp_ble.capture_gate(${num_channels}, ${group_index}, ${output_groups})
  callbacks:
  - set_group_index(${group_index})

parameters:
- id: num_channels
  label: Num Channels
  dtype: int
  default: '1'
- id: group_index
  label: Legacy Group Index
  dtype: int
  default: '0'
  hide: ${ 'all' if output_groups > 1 else 'none' }
- id: output_groups
  label: Output Groups
  dtype: int
  default: '1'

inputs:
- label: in0
  domain: stream
  dtype: complex
- label: in1
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels <= 1 }
- label: command
  domain: message
  id: command

outputs:
- label: out0
  domain: stream
  dtype: complex
- label: out1
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 1 }
- label: out2
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 2 }
- label: out3
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 3 }
- label: out4
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 4 }
- label: out5
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 5 }
- label: out6
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 6 }
- label: out7
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels * output_groups <= 7 }
- label: out8
  domain: stream
  dtype: complex
  optional: true
