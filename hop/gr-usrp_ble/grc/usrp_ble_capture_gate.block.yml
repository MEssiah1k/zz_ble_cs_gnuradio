id: usrp_ble_capture_gate
label: capture_gate
category: '[usrp_ble]'

templates:
  imports: from gnuradio import usrp_ble
  make: usrp_ble.capture_gate(${num_channels}, ${group_index})
  callbacks:
  - set_group_index(${group_index})

parameters:
- id: num_channels
  label: Num Channels
  dtype: int
  default: '1'
- id: group_index
  label: Group Index
  dtype: int
  default: '0'

inputs:
- label: in0
  domain: stream
  dtype: complex
- label: in1
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels <= 1 }
- label: command
  domain: message
  id: command

outputs:
- label: out0
  domain: stream
  dtype: complex
- label: out1
  domain: stream
  dtype: complex
  optional: true
  hide: ${ num_channels <= 1 }

file_format: 1
