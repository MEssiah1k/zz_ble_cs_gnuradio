id: usrp_ble_interact_center_rfhop
label: interact_center_rfhop
category: '[usrp_ble]'

templates:
  imports: from gnuradio import usrp_ble
  make: usrp_ble.interact_center_rfhop(${sample_rate}, ${start_btn}, ${stop_btn}, ${wait_time_ms}, ${settle_time_ms}, ${repeat_total}, ${start_freq_index}, ${stop_freq_index}, ${step_hz})
  callbacks:
  - set_start_btn(${start_btn})
  - set_stop_btn(${stop_btn})
  - set_wait_time_ms(${wait_time_ms})
  - set_settle_time_ms(${settle_time_ms})
  - set_start_freq_index(${start_freq_index})
  - set_stop_freq_index(${stop_freq_index})
  - set_step_hz(${step_hz})

parameters:
- id: sample_rate
  label: Sample Rate
  dtype: int
  default: 1000000
- id: start_btn
  label: Start
  dtype: int
  default: 0
- id: stop_btn
  label: Stop
  dtype: int
  default: 0
- id: wait_time_ms
  label: Phase Time (ms)
  dtype: float
  default: 10.0
- id: settle_time_ms
  label: Retune Settle Time (ms)
  dtype: float
  default: 5.0
- id: repeat_total
  label: Repeat Total
  dtype: int
  default: 1
- id: start_freq_index
  label: Start Freq Index
  dtype: int
  default: -40
- id: stop_freq_index
  label: Stop Freq Index
  dtype: int
  default: 40
- id: step_hz
  label: Hop Step (Hz)
  dtype: real
  default: 1e6

inputs:
- label: in
  domain: stream
  dtype: complex

outputs:
- label: send1_ctrl
  domain: message
  id: send1_ctrl
  optional: 1
- label: send2_ctrl
  domain: message
  id: send2_ctrl
  optional: 1
- label: store1_ctrl
  domain: message
  id: store1_ctrl
  optional: 1
- label: store2_ctrl
  domain: message
  id: store2_ctrl
  optional: 1
- label: capture_ctrl
  domain: message
  id: capture_ctrl
  optional: 1
- label: freq_ctrl
  domain: message
  id: freq_ctrl
  optional: 1

file_format: 1
