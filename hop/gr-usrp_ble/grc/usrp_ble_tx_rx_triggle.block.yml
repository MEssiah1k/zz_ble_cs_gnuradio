id: usrp_ble_tx_rx_triggle
label: tx_rx_triggle
category: '[usrp_ble]'

templates:
  imports: from gnuradio import usrp_ble
  make: usrp_ble.tx_rx_triggle(${selector})
parameters:
- id: selector
  label: selector (1=TX, 0=RX)
  dtype: bool
  default: true

inputs:
- label: in
  dtype: float

outputs:
- label: out
  dtype: float
- label: cmd
  domain: message

#  'file_format' specifies the version of the GRC yml format used in the file
#  and should usually not be changed.
file_format: 1
